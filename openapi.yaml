openapi: 3.0.3

info:
  title: Multi-Store Stock Management API
  description: REST API for managing product stock across multiple stores with role-based access control.
  version: 1.0.0

servers:
  - url: http://localhost:5000/api
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Error description"

    User:
      type: object
      properties:
        id:
          type: string
          example: "64a1f2c3d4e5f6a7b8c9d0e1"
        name:
          type: string
          example: "Alice Smith"
        email:
          type: string
          example: "alice@example.com"
        role:
          type: string
          enum: [admin, shopper]
          example: admin
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    Product:
      type: object
      properties:
        _id:
          type: string
          example: "64a1f2c3d4e5f6a7b8c9d0e1"
        name:
          type: string
          example: "Wireless Headphones"
        sku:
          type: string
          example: "HDN-002"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Store:
      type: object
      properties:
        _id:
          type: string
          example: "64a1f2c3d4e5f6a7b8c9d0e2"
        name:
          type: string
          example: "Downtown Branch"
        location:
          type: string
          example: "123 Main St"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Stock:
      type: object
      properties:
        _id:
          type: string
          example: "64a1f2c3d4e5f6a7b8c9d0e3"
        product:
          $ref: "#/components/schemas/Product"
        store:
          $ref: "#/components/schemas/Store"
        quantity:
          type: integer
          minimum: 0
          example: 42
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    StockSummary:
      type: object
      properties:
        totalProducts:
          type: integer
          example: 5
        totalStores:
          type: integer
          example: 3
        lowStock:
          type: integer
          description: Entries with quantity between 1 and 10
          example: 2
        outOfStock:
          type: integer
          description: Entries with quantity equal to 0
          example: 1

paths:
  /auth/register:
    post:
      summary: Register a new user
      description: Creates a new account with the `shopper` role by default.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: "Alice Smith"
                email:
                  type: string
                  example: "alice@example.com"
                password:
                  type: string
                  example: "securepassword"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      summary: Log in and receive a JWT
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: "alice@example.com"
                password:
                  type: string
                  example: "securepassword"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          description: Missing email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products:
    get:
      summary: List all products
      description: Returns all products. Available to any authenticated user.
      tags: [Products]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Products fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a new product
      description: Admin only. SKU must be unique across all products.
      tags: [Products]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, sku]
              properties:
                name:
                  type: string
                  example: "Wireless Headphones"
                sku:
                  type: string
                  example: "HDN-002"
      responses:
        "201":
          description: Product created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Product"
        "400":
          description: Missing name or SKU
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions (shopper role)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: SKU already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /stores:
    get:
      summary: List all stores
      description: Returns all stores. Available to any authenticated user.
      tags: [Stores]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stores fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Store"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a new store
      description: Admin only.
      tags: [Stores]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "Downtown Branch"
                location:
                  type: string
                  example: "123 Main St"
      responses:
        "201":
          description: Store created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Store"
        "400":
          description: Store name is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions (shopper role)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /stock:
    get:
      summary: List all stock entries
      description: Returns stock for all product/store pairs. Supports a low-stock threshold filter. Available to any authenticated user.
      tags: [Stock]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: threshold
          schema:
            type: integer
            minimum: 0
          required: false
          description: If provided, returns only entries with quantity ≤ threshold.
          example: 10
      responses:
        "200":
          description: Stock fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Stock"
        "400":
          description: Invalid threshold value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Initialise stock for a product/store pair
      description: Admin only. Creates a stock record. Fails if one already exists for this product/store combination.
      tags: [Stock]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, storeId, quantity]
              properties:
                productId:
                  type: string
                  example: "64a1f2c3d4e5f6a7b8c9d0e1"
                storeId:
                  type: string
                  example: "64a1f2c3d4e5f6a7b8c9d0e2"
                quantity:
                  type: integer
                  minimum: 0
                  example: 50
      responses:
        "201":
          description: Stock initialised successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Stock"
        "400":
          description: Missing fields or non-negative quantity constraint violated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions (shopper role)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Product or store not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Stock already initialised for this product/store pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /stock/summary:
    get:
      summary: Dashboard summary counts
      description: Returns total products, total stores, low-stock count (1–10), and out-of-stock count (0). Available to any authenticated user.
      tags: [Stock]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Summary fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/StockSummary"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /stock/adjust:
    patch:
      summary: Adjust stock quantity at a store
      description: |
        Admin only. Applies a signed integer delta to the stock quantity.
        A positive delta restocks; a negative delta reduces stock.
        The adjustment is rejected if it would drive quantity below zero.
        The non-negative guarantee is enforced atomically at the database layer.
      tags: [Stock]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, storeId, delta]
              properties:
                productId:
                  type: string
                  example: "64a1f2c3d4e5f6a7b8c9d0e1"
                storeId:
                  type: string
                  example: "64a1f2c3d4e5f6a7b8c9d0e2"
                delta:
                  type: integer
                  description: Non-zero integer. Positive to add stock, negative to reduce.
                  example: -5
      responses:
        "200":
          description: Stock adjusted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Stock"
        "400":
          description: Missing fields or delta is zero
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions (shopper role)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Product, store, or stock record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Adjustment would drive stock below zero
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /stock/transfer:
    post:
      summary: Transfer stock between stores
      description: |
        Admin only. Moves a quantity of a product from one store to another.
        The operation is fully atomic — it either fully succeeds or fully fails.
        The source store must have sufficient stock.
        Source and destination must be different stores.
      tags: [Stock]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, fromStoreId, toStoreId, quantity]
              properties:
                productId:
                  type: string
                  example: "64a1f2c3d4e5f6a7b8c9d0e1"
                fromStoreId:
                  type: string
                  example: "64a1f2c3d4e5f6a7b8c9d0e2"
                toStoreId:
                  type: string
                  example: "64a1f2c3d4e5f6a7b8c9d0e3"
                quantity:
                  type: integer
                  minimum: 1
                  example: 10
      responses:
        "200":
          description: Stock transferred successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      sourceStock:
                        $ref: "#/components/schemas/Stock"
                      destStock:
                        $ref: "#/components/schemas/Stock"
        "400":
          description: Missing fields, non-positive quantity, or same-store transfer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions (shopper role)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Product or store not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Insufficient stock at source store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
